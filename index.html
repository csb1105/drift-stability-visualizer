<script>
const driftInput = document.getElementById('drift');
const pressureInput = document.getElementById('pressure');
const ambiguityInput = document.getElementById('ambiguity');
const capacityInput = document.getElementById('capacity');

const driftVal = document.getElementById('driftVal');
const pressureVal = document.getElementById('pressureVal');
const ambiguityVal = document.getElementById('ambiguityVal');
const capacityVal = document.getElementById('capacityVal');

const state = document.getElementById('state');
const risk = document.getElementById('risk');

const canvas = document.getElementById('driftChart');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = 220;
}

function drawDrift(d, p, a, c) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let intensity = (d + p + a) / 300;
  let thresholdY = canvas.height * (1 - c / 100);

  // threshold line
  ctx.beginPath();
  ctx.setLineDash([6, 6]);
  ctx.moveTo(0, thresholdY);
  ctx.lineTo(canvas.width, thresholdY);
  ctx.strokeStyle = "red";
  ctx.stroke();
  ctx.setLineDash([]);

  // current position
  let currentX = canvas.width * intensity;
  let currentY = canvas.height - Math.pow(intensity, 2 + intensity * 3) * canvas.height;

  let crossed = currentY <= thresholdY;

  // background tint if crossed
  if (crossed) {
    ctx.fillStyle = "rgba(255,0,0,0.06)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // curve
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);

  let crossX = null;

  for (let x = 0; x < canvas.width; x++) {
    let t = x / canvas.width;
    let yNorm = Math.pow(t, 2 + intensity * 3);
    let y = canvas.height - yNorm * canvas.height;

    if (!crossX && y <= thresholdY) crossX = x;

    ctx.lineTo(x, y);
  }

  ctx.strokeStyle = crossed ? "red" : "black";
  ctx.lineWidth = 2;
  ctx.stroke();

  // collapse point
  if (crossX) {
    ctx.beginPath();
    ctx.arc(crossX, thresholdY, 6, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();
  }

  // moving dot
  ctx.beginPath();
  ctx.arc(currentX, currentY, 7, 0, Math.PI * 2);
  ctx.fillStyle = crossed ? "red" : "blue";
  ctx.fill();
}

function update() {
  let d = +driftInput.value;
  let p = +pressureInput.value;
  let a = +ambiguityInput.value;
  let c = +capacityInput.value;

  driftVal.textContent = d;
  pressureVal.textContent = p;
  ambiguityVal.textContent = a;
  capacityVal.textContent = c;

  let raw = d + p + a - c;
  let scaled = Math.max(0, Math.min(100, (raw + 100) / 3));

  risk.textContent = "Risk Score: " + Math.round(scaled);

  if (scaled < 20) state.textContent = "Stable";
  else if (scaled < 40) state.textContent = "Recoverable Drift";
  else if (scaled < 70) state.textContent = "False Stability";
  else state.textContent = "Failure Trajectory";

  drawDrift(d, p, a, c);
}

[driftInput, pressureInput, ambiguityInput, capacityInput]
  .forEach(i => i.addEventListener('input', update));

window.addEventListener('resize', () => {
  resizeCanvas();
  update();
});

resizeCanvas();
update();
</script>
